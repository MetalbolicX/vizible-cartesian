<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Time series</title>
  </head>
  <style>
    body {
      font-family: Arial, sans-serif;
    }

    .series {
      opacity: 0.6;
      transition: opacity 0.3s ease-in-out;

      .serie {
        fill: none;
        stroke-width: 2;
        stroke-linejoin: round;
        stroke-linecap: round;
      }

      &:has(.serie:hover, .point:hover) .series-group:not(:hover) {
        opacity: 0.3;
      }

      &:has(.serie:hover, .point:hover) .series-group:hover {
        opacity: 1;

        .serie {
          stroke-width: 4;
        }
      }
    }

    .cursor {
      &.vertical-line {
        stroke: #666;
        stroke-width: 1;
        pointer-events: none;
        stroke-dasharray: 3, 3;
      }

      &.point {
        fill: white;
        stroke-width: 2;
      }
    }
  </style>
  <link rel="stylesheet" href="styles.css" />
  <body>
    <figure id="viz-container"></figure>
    <tip-viz-tooltip id="tooltip" transition-duration="200"></tip-viz-tooltip>
    <!-- <script type="module" src="./examples/custom-scatter.ts" lang="ts"></script> -->
    <script type="module" lang="javascript">
      import { main } from "./src/line/main.mjs";
      const container = document.getElementById("viz-container");
      main(container);
    </script>
  </body>
</html>
